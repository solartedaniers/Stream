name: stream
description: "A Flutter file download manager powered by StreamController and Isolates."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  open_filex: ^4.3.4
  uuid: ^4.3.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/l10n/es.json
